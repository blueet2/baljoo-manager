<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아주약품 소모품 발주관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--surface:#fff;--border:#e2e0d8;--text:#1a1a1a;--muted:#888880;--accent:#003087;--accent-light:#e8eef7;--warn:#d97706;--warn-light:#fffbeb;--danger:#dc2626;--danger-light:#fef2f2;--success:#16a34a;--success-light:#f0fdf4}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#001a4d 0%,#003087 100%)}
.login-box{background:var(--surface);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-header{text-align:center;margin-bottom:2rem}
.login-logo-img{width:60px;height:60px;object-fit:contain;margin-bottom:12px}
.login-title{font-size:16px;font-weight:600;color:var(--accent);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--muted)}
.login-tab{display:flex;margin-bottom:1.5rem;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.login-tab button{flex:1;padding:9px;border:none;background:none;font-size:13px;font-family:inherit;cursor:pointer;color:var(--muted)}
.login-tab button.active{background:var(--accent);color:#fff;font-weight:500}
.login-form{display:flex;flex-direction:column;gap:12px}
.login-form input{padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text)}
.login-form input:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.login-btn{padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;margin-top:4px}
.login-btn:hover{background:#002070}
.login-msg{font-size:12px;text-align:center;min-height:18px}
#app-screen{display:none}
header{background:var(--accent);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.header-logo{width:32px;height:32px;object-fit:contain;filter:brightness(10)}
.header-title{font-size:14px;font-weight:600;color:#fff;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:8px}
.user-badge{font-size:12px;background:rgba(255,255,255,0.2);color:#fff;padding:4px 10px;border-radius:20px;font-weight:500}
.admin-badge{font-size:12px;background:#fbbf24;color:#92400e;padding:4px 10px;border-radius:20px;font-weight:500}
.btn-logout{padding:6px 12px;font-size:12px;color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.3);border-radius:6px;background:none;cursor:pointer}
.btn-logout:hover{background:rgba(255,255,255,0.1)}
nav{background:#fff;border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;gap:2px;overflow-x:auto}
nav button{padding:12px 14px;border:none;background:none;font-size:13px;font-family:inherit;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s}
nav button:hover{color:var(--text)}
nav button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
main{max-width:1100px;margin:0 auto;padding:1.5rem}
.page-title{font-size:18px;font-weight:600;margin-bottom:1.25rem}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
@media(max-width:600px){.cards{grid-template-columns:repeat(2,1fr)}}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem}
.metric-label{font-size:12px;color:var(--muted);margin-bottom:6px}
.metric-value{font-size:24px;font-weight:600}
.metric-value.accent{color:var(--accent)}
.metric-value.warn{color:var(--warn)}
.metric-value.danger{color:var(--danger)}
.metric-value.success{color:var(--success)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.card-title{font-size:14px;font-weight:600;margin-bottom:1rem;color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.form-row.four{grid-template-columns:1fr 1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;color:var(--muted);font-weight:500}
.form-group input,.form-group select,.form-group textarea{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.form-group textarea{resize:vertical;min-height:60px}
.btn-row{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all 0.15s}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#002070}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{background:var(--danger-light);color:var(--danger);border-color:var(--danger)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);background:#f9f9f7}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafaf8}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-ok{background:var(--success-light);color:var(--success)}
.badge-warn{background:var(--warn-light);color:var(--warn)}
.badge-danger{background:var(--danger-light);color:var(--danger)}
.badge-info{background:var(--accent-light);color:var(--accent)}
.badge-admin{background:#fef3c7;color:#92400e}
.badge-user{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:14px}
.need-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.need-item.urgent{border-left:3px solid var(--danger)}
.need-name{font-size:14px;font-weight:600;margin-bottom:3px}
.need-detail{font-size:12px;color:var(--muted);margin-top:2px}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:all 0.3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filter-bar select,.filter-bar input{font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text)}
</style>
</head>

<script>
const SUPABASE_URL = 'https://woohpuhljpamgappqcdu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indvb2hwdWhsanBhbWdhcHBxY2R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MzE0MjYsImV4cCI6MjA5MDUwNzQyNn0.yATuXGWne2w8WlsPRPwlL2_w-1C4TSOqyqRrt_U6t1A';

const DEPARTMENTS = ['공장지원팀','생산기획팀','공무팀','물류팀','위수탁영업팀','고형제제조1팀','고형제제조2팀','고형제포장1팀','고형제포장2팀','주사제제조팀','주사제포장팀','제제개선팀','품질관리1팀','품질관리2팀','품질보증팀','DI팀'];
const DEPT_OPTS = DEPARTMENTS.map(d=>`<option value="${d}">${d}</option>`).join('');

let currentUserName='', currentRole='user', currentUserId='', authToken='', loginMode='login';

function getH(){return{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${authToken||SUPABASE_KEY}`,'Prefer':'return=representation'}}
async function api(path,method='GET',body=null){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{method,headers:getH(),body:body?JSON.stringify(body):null});
  if(!res.ok){const e=await res.text();throw new Error(e)}
  const t=await res.text();return t?JSON.parse(t):[];
}
async function authApi(path,body){
  const res=await fetch(`${SUPABASE_URL}/auth/v1/${path}`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY},body:JSON.stringify(body)});
  return await res.json();
}
function today(){return new Date().toISOString().split('T')[0]}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function fmtAmt(v){return v?(parseFloat(v)).toFixed(1)+'만원':'-'}

function switchLoginTab(mode){
  loginMode=mode;
  document.getElementById('tab-login').classList.toggle('active',mode==='login');
  document.getElementById('tab-signup').classList.toggle('active',mode==='signup');
  document.getElementById('auth-name').style.display=mode==='signup'?'block':'none';
  document.getElementById('auth-btn').textContent=mode==='login'?'로그인':'회원가입';
  document.getElementById('auth-msg').textContent='';
}

async function handleAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value;
  const name=document.getElementById('auth-name').value.trim();
  const msgEl=document.getElementById('auth-msg');
  msgEl.style.color='var(--danger)';msgEl.textContent='';
  if(!email||!password){msgEl.textContent='이메일과 비밀번호를 입력해주세요';return}
  if(loginMode==='signup'&&!name){msgEl.textContent='이름을 입력해주세요';return}
  document.getElementById('auth-btn').textContent='처리 중...';
  if(loginMode==='signup'){
    const res=await authApi('signup',{email,password,data:{name}});
    if(res.error){msgEl.textContent='가입 실패: '+res.error.message}
    else{msgEl.style.color='var(--success)';msgEl.textContent='가입 완료! 로그인해주세요.';switchLoginTab('login')}
    document.getElementById('auth-btn').textContent='회원가입';
  }else{
    const res=await authApi('token?grant_type=password',{email,password});
    if(res.error){msgEl.textContent='이메일 또는 비밀번호가 틀렸어요';document.getElementById('auth-btn').textContent='로그인';return}
    authToken=res.access_token;currentUserId=res.user.id;
    currentUserName=res.user.user_metadata?.name||email.split('@')[0];
    const profiles=await api(`profiles?id=eq.${currentUserId}&select=role,name`);
    currentRole=profiles.length>0?profiles[0].role:'user';
    if(profiles.length>0&&profiles[0].name)currentUserName=profiles[0].name;
    document.getElementById('auth-btn').textContent='로그인';
    showApp();
  }
}

async function handleLogout(){
  await fetch(`${SUPABASE_URL}/auth/v1/logout`,{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${authToken}`}});
  authToken='';currentUserName='';currentRole='user';currentUserId='';
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('auth-password').value='';
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('user-display').textContent=currentUserName;
  const rb=document.getElementById('role-badge');
  if(currentRole==='admin'){rb.className='admin-badge';rb.textContent='관리자'}else{rb.className='';rb.textContent=''}

function renderMain(html){document.getElementById('main-content').innerHTML=html}

function switchTab(id,btn){
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(id==='dashboard')renderDashboard();
  else if(id==='items')renderItems();
  else if(id==='order')renderOrder();
  else if(id==='receive')renderReceive();
  else if(id==='history')renderHistory();
  else if(id==='need')renderNeed();
  else if(id==='users')renderUsers();
  else if(id==='upload')renderUpload();
}

async function renderDashboard(){
  renderMain(`<div class="page-title">대시보드</div>

    </div>`);
  const [items,orders]=await Promise.all([api('items?select=*'),api('orders?select=*')]);
  const now=new Date();
  const pending=orders.filter(o=>o.status==='발주중');
  const monthAmt=orders.filter(o=>{const d=new Date(o.order_date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}).reduce((s,o)=>s+(parseFloat(o.amount)||0),0);

  }else{
    const myPending=pending.filter(o=>o.created_by===currentUserName);
    const myMonthAmt=orders.filter(o=>{const d=new Date(o.order_date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()&&o.created_by===currentUserName}).reduce((s,o)=>s+(parseFloat(o.amount)||0),0);
    cards=`
      <div class="metric"><div class="metric-label">전체 품목</div><div class="metric-value accent">${items.length}</div></div>

      <div class="metric"><div class="metric-label">이번달 발주금액</div><div class="metric-value" style="font-size:18px">${myMonthAmt.toFixed(1)}만원</div></div>

  }

  const needList=document.getElementById('dash-need-list');
  if(needItems.length===0){needList.innerHTML='<div class="empty">발주 필요 품목이 없어요</div>';return}
  needList.innerHTML=needItems.map(i=>`
    <div class="need-item urgent">
      <div>
        <div class="need-name">${i.name} <span style="font-weight:400;color:var(--muted);font-size:12px">${i.vendor}</span></div>

async function loadItemsTable(){
  const cat=document.getElementById('if-cat')?.value||'';
  const search=document.getElementById('if-search')?.value.toLowerCase()||'';
  let q='items?select=*&order=name.asc';
  if(cat)q+=`&category=eq.${cat}`;
  const items=await api(q);
  const filtered=search?items.filter(i=>i.name.toLowerCase().includes(search)):items;
  document.getElementById('items-table').innerHTML=filtered.length===0
    ?'<tr><td colspan="8" class="empty">등록된 품목이 없어요</td></tr>'
    :filtered.map(i=>`<tr>
      <td><strong>${i.name}</strong></td>
      <td><span class="badge badge-info">${i.category||'소모품'}</span></td>
      <td style="color:var(--muted)">${i.sub_category||'-'}</td>
      <td>${i.vendor}</td><td>${i.unit}</td>
      <td><span class="badge ${i.need_order?'badge-danger':'badge-ok'}">${i.need_order?'필요':'정상'}</span></td>
      <td style="color:var(--muted);font-size:12px">${i.memo||'-'}</td>
      <td><button class="btn btn-sm" onclick="deleteItem(${i.id})">삭제</button></td>
    </tr>`).join('');
}

async function addItem(){
  const name=document.getElementById('i-name').value.trim();
  const vendor=document.getElementById('i-vendor').value.trim();
  const unit=document.getElementById('i-unit').value.trim()||'개';
  const category=document.getElementById('i-category').value;
  const sub_category=document.getElementById('i-subcategory').value.trim();
  const need_order=document.getElementById('i-need').value==='true';
  const memo=document.getElementById('i-memo').value.trim();
  if(!name||!vendor){showToast('품목명과 업체명을 입력해주세요');return}
  await api('items','POST',{name,vendor,unit,category,sub_category,need_order,memo,stock:0,min_stock:0});
  ['i-name','i-vendor','i-unit','i-subcategory','i-memo'].forEach(id=>document.getElementById(id).value='');
  showToast('품목이 추가되었어요!');loadItemsTable();
}

async function deleteItem(id){
  if(!confirm('정말 삭제할까요?'))return;
  await api(`items?id=eq.${id}`,'DELETE');
  showToast('삭제되었어요');loadItemsTable();
}

      </div>
      <div class="form-row three">
        <div class="form-group"><label>대분류</label><input id="o-category" readonly></div>

      </div>
      <div class="form-row">
        <div class="form-group"><label>발주 예정일 *</label><input id="o-date" type="date" value="${today()}"></div>
        <div class="form-group"><label>비고 (적요)</label><input id="o-note" placeholder="상세 내용 입력"></div>

function fillOrder(){
  const sel=document.getElementById('o-item');
  const opt=sel.options[sel.selectedIndex];
  document.getElementById('o-vendor').value=opt.dataset.vendor||'';
  document.getElementById('o-unit').value=opt.dataset.unit||'';
  document.getElementById('o-category').value=opt.dataset.cat||'';
  document.getElementById('o-subcategory').value=opt.dataset.sub||'';
}

async function addOrder(){
  const item_id=parseInt(document.getElementById('o-item').value);
  const qty=parseInt(document.getElementById('o-qty').value);
  const order_date=document.getElementById('o-date').value;
  const dept=document.getElementById('o-dept').value;
  if(!item_id||!qty||!dept){showToast('품목, 부서, 수량을 입력해주세요');return}
  const item=(window._orderItems||[]).find(i=>i.id===item_id);
  const spec=document.getElementById('o-spec').value.trim();
  const note=document.getElementById('o-note').value.trim();
  const category=document.getElementById('o-category').value;
  const sub_category=document.getElementById('o-subcategory').value;
  await api('orders','POST',{
    item_id,item_name:item.name,vendor:item.vendor,unit:item.unit,
    qty,order_date,note,status:'발주중',created_by:currentUserName,
    category,sub_category,department:dept,spec,amount:0
  });
  showToast('발주가 등록되었어요!');
  document.getElementById('o-qty').value='';
  document.getElementById('o-note').value='';
  document.getElementById('o-spec').value='';
}

  renderMain(`<div class="page-title">입고 등록</div>

      <div id="r-info" style="display:none">
        <div class="form-row three">
          <div class="form-group"><label>품목명</label><input id="r-itemname" readonly></div>
          <div class="form-group"><label>규격</label><input id="r-spec" readonly></div>

        </div>
      </div>

      </div>
      <div class="form-group"><label>비고</label><input id="r-note" placeholder="메모 (선택)"></div>
      <div class="btn-row"><button class="btn btn-primary" onclick="addReceive()">입고 등록</button></div>
    </div>`);
}

async function loadPendingByDept(){
  const dept=document.getElementById('r-dept').value;
  if(!dept)return;
  const orders=await api(`orders?select=*&status=eq.발주중&department=eq.${encodeURIComponent(dept)}&order=order_date.desc`);
  window._pendingOrders=orders;
  const sel=document.getElementById('r-order');
  sel.innerHTML=orders.length===0
    ?'<option value="">발주 중인 건이 없어요</option>'
    :'<option value="">선택하세요</option>'+orders.map(o=>`<option value="${o.id}">[${o.order_date}] ${o.item_name}${o.spec?' ('+o.spec+')':''} ${o.qty}${o.unit}</option>`).join('');
  sel.onchange=()=>{
    const o=(window._pendingOrders||[]).find(x=>x.id===parseInt(sel.value));
    if(!o){document.getElementById('r-info').style.display='none';return}
    document.getElementById('r-info').style.display='block';
    document.getElementById('r-itemname').value=o.item_name;
    document.getElementById('r-spec').value=o.spec||'-';
    document.getElementById('r-orderqty').value=o.qty+o.unit;
    document.getElementById('r-qty').value=o.qty;
  };
}

async function addReceive(){
  const order_id=parseInt(document.getElementById('r-order').value);
  const qty=parseInt(document.getElementById('r-qty').value);
  const amount=parseFloat(document.getElementById('r-amount').value)||0;
  const receive_date=document.getElementById('r-date').value;
  const note=document.getElementById('r-note').value;
  if(!order_id||!qty){showToast('발주 건과 수량을 입력해주세요');return}
  if(!amount){showToast('입고 금액을 입력해주세요');return}
  const order=(window._pendingOrders||[]).find(o=>o.id===order_id);
  await api(`orders?id=eq.${order_id}`,'PATCH',{status:'입고완료',amount,receive_date,receive_qty:qty,received_by:currentUserName});
  await api('receives','POST',{order_id,item_name:order.item_name,vendor:order.vendor,unit:order.unit,qty,receive_date,note,received_by:currentUserName,amount});
  showToast('입고가 등록되었어요!');renderReceive();
}

function filterHistory(){
  const cat=document.getElementById('h-cat').value;
  const dept=document.getElementById('h-dept').value;
  const status=document.getElementById('h-status').value;
  const search=document.getElementById('h-search').value.toLowerCase();
  let f=window._allOrders||[];
  if(cat)f=f.filter(o=>o.category===cat);
  if(dept)f=f.filter(o=>o.department===dept);
  if(status)f=f.filter(o=>o.status===status);
  if(search)f=f.filter(o=>o.item_name.toLowerCase().includes(search));
  renderHistoryTable(f);
}

function renderHistoryTable(orders){

      <td style="color:var(--muted)">${o.department||'-'}</td>
      <td>${o.qty}${o.unit}</td>
      <td style="text-align:right">${o.amount?parseFloat(o.amount).toFixed(1)+'만원':'-'}</td>
      <td style="color:var(--muted)">${o.created_by||'-'}</td>
      <td><span class="badge ${o.status==='입고완료'?'badge-ok':'badge-warn'}">${o.status}</span></td>
    </tr>`).join('');
  document.getElementById('history-total').textContent=`총 ${orders.length}건 / 입고완료 금액 합계: ${total.toFixed(1)}만원`;
}

      <div>
        <div class="need-name">${i.name} <span style="font-weight:400;color:var(--muted);font-size:12px">${i.vendor}</span></div>
        <div class="need-detail"><span class="badge badge-info">${i.category||'소모품'}</span> ${i.sub_category||''} · 단위: ${i.unit}</div>
        ${i.memo?`<div class="need-detail">📝 ${i.memo}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <span class="badge badge-danger">발주 필요</span>
        <button class="btn btn-sm btn-primary" onclick="goOrder()">발주하기</button>
      </div>
    </div>`).join('');
}

// ── 사용자 관리 ──
async function renderUsers(){
  renderMain(`<div class="page-title">사용자 관리</div>
    <div class="card">
      <table><thead><tr><th>이름</th><th>권한</th><th>가입일</th><th>권한 변경</th></tr></thead>
      <tbody id="users-table"><tr><td colspan="4" class="empty">로딩 중...</td></tr></tbody></table>
    </div>`);
  const profiles=await api('profiles?select=*&order=created_at.asc');
  document.getElementById('users-table').innerHTML=profiles.length===0
    ?'<tr><td colspan="4" class="empty">사용자가 없어요</td></tr>'
    :profiles.map(p=>{
      const isAdmin=p.role==='admin';const isSelf=p.id===currentUserId;
      return`<tr>
        <td>${p.name||'(이름 없음)'}</td>
        <td><span class="badge ${isAdmin?'badge-admin':'badge-user'}">${isAdmin?'관리자':'사용자'}</span></td>
        <td style="color:var(--muted)">${p.created_at?p.created_at.split('T')[0]:'-'}</td>
        <td>${isSelf?'<span style="color:var(--muted);font-size:12px">본인</span>':`<button class="btn btn-sm ${isAdmin?'btn-danger':''}" onclick="toggleRole('${p.id}','${p.role}')">${isAdmin?'사용자로 변경':'관리자로 변경'}</button>`}</td>
      </tr>`;}).join('');
}

async function toggleRole(id,role){
  const newRole=role==='admin'?'user':'admin';
  if(!confirm(`${newRole==='admin'?'관리자':'사용자'}로 변경할까요?`))return;
  await api(`profiles?id=eq.${id}`,'PATCH',{role:newRole});
  showToast('권한이 변경되었어요!');renderUsers();
}

// ── 데이터 업로드 ──
function renderUpload(){
  renderMain(`<div class="page-title">데이터 업로드</div>
    <div class="card" style="background:var(--accent-light);border-color:#c7d8f0">
      <div class="card-title" style="color:var(--accent)">💡 업로드 안내</div>
      <p style="font-size:13px;color:#1e40af;line-height:1.8">
        발주이력 CSV 파일을 업로드하면 자동으로 품목/업체 정보도 함께 등록됩니다.<br>
        컬럼 순서: <strong>입고일, 대분류, 소분류, 적요(품목명), 수량, 금액합, 거래처(업체명), 부서명</strong>
      </p>
    </div>
    <div class="card">
      <div class="card-title">📋 발주이력 + 품목 일괄 업로드</div>
      <input type="file" id="upload-file" accept=".csv" style="font-size:13px;margin-bottom:12px">
      <div id="upload-preview" style="margin-bottom:12px"></div>
      <div class="btn-row"><button class="btn btn-primary" onclick="doUpload()">업로드 시작</button></div>
    </div>`);
  document.getElementById('upload-file').addEventListener('change',previewUpload);
}

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  const headers=parseCSVLine(lines[0]);
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=parseCSVLine(line);
    const obj={};headers.forEach((h,i)=>obj[h]=(vals[i]||'').trim());return obj;
  });
}
function parseCSVLine(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else inQ=!inQ}
    else if(ch===','&&!inQ){result.push(cur);cur=''}
    else cur+=ch;
  }
  result.push(cur);return result;
}

async function previewUpload(e){
  const file=e.target.files[0];if(!file)return;
  const tryRead=(enc)=>new Promise(res=>{const r=new FileReader();r.onload=ev=>res(ev.target.result);r.readAsText(file,enc)});
  let text=await tryRead('UTF-8');
  if(/[\uFFFD]/.test(text)||text.includes('â€'))text=await tryRead('EUC-KR');
  window._uploadCSV=text;
  const rows=parseCSV(text);
  const preview=document.getElementById('upload-preview');
  if(rows.length===0){preview.innerHTML='<p style="color:var(--danger)">데이터가 없어요</p>';return}
  const keys=Object.keys(rows[0]);
  preview.innerHTML=`<p style="font-size:12px;color:var(--muted);margin-bottom:6px">${rows.length}개 행 미리보기 (처음 3개):</p>
    <div style="overflow-x:auto"><table style="font-size:12px">
      <thead><tr>${keys.map(k=>`<th style="padding:5px 8px;border-bottom:1px solid var(--border);color:var(--muted)">${k}</th>`).join('')}</tr></thead>
      <tbody>${rows.slice(0,3).map(r=>`<tr>${keys.map(k=>`<td style="padding:5px 8px;border-bottom:1px solid var(--border)">${r[k]||'-'}</td>`).join('')}</tr>`).join('')}</tbody>
    </table></div>`;
}

async function doUpload(){
  const text=window._uploadCSV;
  if(!text){showToast('파일을 먼저 선택해주세요');return}
  const rows=parseCSV(text);
  if(rows.length===0){showToast('데이터가 없어요');return}

  let orderOk=0,orderFail=0,itemOk=0;
  const existingItems=await api('items?select=*');
  const itemMap=new Map(existingItems.map(i=>[i.name+'|'+i.vendor,i]));
  const newItems=new Map();
  let firstErr='';

  for(const row of rows){
    const item_name=row['적요']||row['품목명']||'';
    const vendor=row['거래처']||row['업체명']||'';
    const category=row['대분류']||'소모품';
    const sub_category=row['소분류']||'기타';
    const qty=parseInt(row['수량'])||1;
    const amount=parseFloat(row['금액합']||row['금액']||0)||0;
    const department=row['부서명']||'';
    const order_date=row['입고일']||row['발주일자']||today();
    const status=row['상태']||'입고완료';
    const note=row['비고']||'';
    const unit=row['단위']||'개';
    if(!item_name||!vendor){orderFail++;continue}

    const key=item_name+'|'+vendor;
    if(!itemMap.has(key)&&!newItems.has(key)){
      try{
        const newItem=await api('items','POST',{name:item_name,vendor,unit,category,sub_category,stock:0,min_stock:0,need_order:false});
        if(newItem&&newItem[0])itemMap.set(key,newItem[0]);
        newItems.set(key,true);itemOk++;
      }catch(e){if(!firstErr)firstErr=e.message}
    }
    const matched=itemMap.get(key);
    try{
      await api('orders','POST',{
        item_id:matched?.id||null,item_name,vendor,unit,qty,order_date,
        note,status,created_by:'일괄업로드',
        category,sub_category,department,amount
      });
      orderOk++;
    }catch(e){orderFail++;if(!firstErr)firstErr=e.message}
  }

  if(firstErr)alert('오류 상세:\n'+firstErr);
  showToast(`✅ 발주이력 ${orderOk}건 / 신규품목 ${itemOk}개 등록${orderFail>0?' / ❌ '+orderFail+'건 실패':''}`);
}
</script>
