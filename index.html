<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소모품 발주 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #1a1a1a;
    --text-muted: #888880;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --warn: #d97706;
    --warn-light: #fffbeb;
    --danger: #dc2626;
    --danger-light: #fef2f2;
    --success: #16a34a;
    --success-light: #f0fdf4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; }
  .login-logo { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 0.5rem; }
  .login-logo span { color: var(--accent); }
  .login-sub { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 2rem; }
  .login-tab { display: flex; margin-bottom: 1.5rem; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .login-tab button { flex: 1; padding: 8px; border: none; background: none; font-size: 13px; font-family: inherit; cursor: pointer; color: var(--text-muted); }
  .login-tab button.active { background: var(--accent); color: #fff; font-weight: 500; }
  .login-form { display: flex; flex-direction: column; gap: 12px; }
  .login-form input { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text); }
  .login-form input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  .login-btn { padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; margin-top: 4px; }
  .login-btn:hover { background: #1d4ed8; }
  .login-msg { font-size: 12px; text-align: center; min-height: 18px; }

  #app-screen { display: none; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 15px; font-weight: 600; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .user-badge { font-size: 12px; background: var(--accent-light); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-weight: 500; }
  .admin-badge { font-size: 12px; background: #fef3c7; color: #92400e; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
  .btn-logout { padding: 6px 12px; font-size: 12px; color: var(--text-muted); border: 1px solid var(--border); border-radius: 6px; background: none; cursor: pointer; }
  .btn-logout:hover { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }

  nav { display: flex; gap: 2px; }
  nav button { padding: 6px 14px; border: none; background: none; font-size: 13px; font-family: inherit; color: var(--text-muted); cursor: pointer; border-radius: 6px; transition: all 0.15s; }
  nav button:hover { background: var(--bg); color: var(--text); }
  nav button.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }

  main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
  .section { display: none; }
  .section.active { display: block; }
  .page-title { font-size: 18px; font-weight: 600; margin-bottom: 1.5rem; }

  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 2rem; }
  @media(max-width:600px){ .cards { grid-template-columns: repeat(2,1fr); } }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; }
  .metric-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .metric-value { font-size: 26px; font-weight: 600; }
  .metric-value.warn { color: var(--warn); }
  .metric-value.danger { color: var(--danger); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 1rem; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .form-group input, .form-group select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); background: var(--surface); }

  .btn-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1rem; }
  .btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: all 0.15s; }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-danger { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  tbody td { padding: 11px 12px; border-bottom: 1px solid var(--border); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-ok { background: var(--success-light); color: var(--success); }
  .badge-danger { background: var(--danger-light); color: var(--danger); }
  .badge-info { background: var(--accent-light); color: var(--accent); }
  .badge-admin { background: #fef3c7; color: #92400e; }
  .badge-user { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }

  .empty { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 14px; }

  .rec-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .rec-item.urgent { border-left: 3px solid var(--danger); }
  .rec-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .rec-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .pending-banner { background: var(--warn-light); border: 1px solid #fde68a; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 14px; color: #92400e; text-align: center; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">📦 <span>발주</span>관리</div>
    <div class="login-sub">소모품 발주 관리 시스템</div>
    <div class="login-tab">
      <button class="active" id="tab-login" onclick="switchLoginTab('login')">로그인</button>
      <button id="tab-signup" onclick="switchLoginTab('signup')">회원가입</button>
    </div>
    <div class="login-form">
      <input id="auth-email" type="email" placeholder="이메일">
      <input id="auth-password" type="password" placeholder="비밀번호">
      <input id="auth-name" type="text" placeholder="이름 (팀에서 표시될 이름)" style="display:none">
      <div class="login-msg" id="auth-msg"></div>
      <button class="login-btn" id="auth-btn" onclick="handleAuth()">로그인</button>
    </div>
  </div>
</div>

<div id="app-screen">
  <header>
    <div class="logo">📦 <span>발주</span>관리</div>
    <nav id="main-nav"></nav>
    <div class="header-right">
      <span id="role-badge"></span>
      <span class="user-badge" id="user-display"></span>
      <button class="btn-logout" onclick="handleLogout()">로그아웃</button>
    </div>
  </header>
  <main id="main-content"></main>
</div>

<div class="toast" id="toast"></div>

<script>
// =====================================================
const SUPABASE_URL = 'https://woohpuhljpamgappqcdu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indvb2hwdWhsanBhbWdhcHBxY2R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MzE0MjYsImV4cCI6MjA5MDUwNzQyNn0.yATuXGWne2w8WlsPRPwlL2_w-1C4TSOqyqRrt_U6t1A';
// =====================================================

let currentUserName = '';
let currentRole = 'user';
let currentUserId = '';
let authToken = SUPABASE_KEY;
let loginMode = 'login';

function getHeaders() {
  return { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${authToken}`, 'Prefer': 'return=representation' };
}

async function api(path, method='GET', body=null) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { method, headers: getHeaders(), body: body ? JSON.stringify(body) : null });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const t = await res.text();
  return t ? JSON.parse(t) : [];
}

async function authApi(path, body) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/${path}`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY }, body: JSON.stringify(body) });
  return await res.json();
}

function today() { return new Date().toISOString().split('T')[0]; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchLoginTab(mode) {
  loginMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('auth-name').style.display = mode === 'signup' ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = mode === 'login' ? '로그인' : '회원가입';
  document.getElementById('auth-msg').textContent = '';
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const name = document.getElementById('auth-name').value.trim();
  const msgEl = document.getElementById('auth-msg');
  msgEl.style.color = 'var(--danger)'; msgEl.textContent = '';
  if (!email || !password) { msgEl.textContent = '이메일과 비밀번호를 입력해주세요'; return; }
  if (loginMode === 'signup' && !name) { msgEl.textContent = '이름을 입력해주세요'; return; }
  document.getElementById('auth-btn').textContent = '처리 중...';

  if (loginMode === 'signup') {
    const res = await authApi('signup', { email, password, data: { name } });
    if (res.error) { msgEl.textContent = '가입 실패: ' + res.error.message; }
    else { msgEl.style.color = 'var(--success)'; msgEl.textContent = '가입 완료! 로그인해주세요.'; switchLoginTab('login'); }
    document.getElementById('auth-btn').textContent = '회원가입';
  } else {
    const res = await authApi('token?grant_type=password', { email, password });
    if (res.error) { msgEl.textContent = '이메일 또는 비밀번호가 틀렸어요'; document.getElementById('auth-btn').textContent = '로그인'; return; }
    authToken = res.access_token;
    currentUserId = res.user.id;
    currentUserName = res.user.user_metadata?.name || email.split('@')[0];
    // 권한 확인
    const profiles = await api(`profiles?id=eq.${currentUserId}&select=role,name`);
    currentRole = profiles.length > 0 ? profiles[0].role : 'user';
    if (profiles.length > 0 && profiles[0].name) currentUserName = profiles[0].name;
    document.getElementById('auth-btn').textContent = '로그인';
    showApp();
  }
}

async function handleLogout() {
  await fetch(`${SUPABASE_URL}/auth/v1/logout`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${authToken}` } });
  authToken = SUPABASE_KEY; currentUserName = ''; currentRole = 'user'; currentUserId = '';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('auth-password').value = '';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('user-display').textContent = currentUserName;
  const rb = document.getElementById('role-badge');
  if (currentRole === 'admin') { rb.className = 'admin-badge'; rb.textContent = '관리자'; }
  else { rb.className = ''; rb.textContent = ''; }
  renderNav();
  if (currentRole === 'admin') renderAdminDashboard();
  else renderUserHome();
}

function renderNav() {
  const nav = document.getElementById('main-nav');
  if (currentRole === 'admin') {
    nav.innerHTML = `
      <button class="active" onclick="switchTab('dashboard', this)">대시보드</button>
      <button onclick="switchTab('order', this)">발주 등록</button>
      <button onclick="switchTab('receive', this)">입고 등록</button>
      <button onclick="switchTab('history', this)">발주 이력</button>
      <button onclick="switchTab('items', this)">품목/업체</button>
      <button onclick="switchTab('recommend', this)">발주 필요</button>
      <button onclick="switchTab('users', this)">사용자 관리</button>
      <button onclick="switchTab('upload', this)">데이터 업로드</button>
    `;
  } else {
    nav.innerHTML = `
      <button class="active" onclick="switchTab('order', this)">발주 등록</button>
      <button onclick="switchTab('receive', this)">입고 등록</button>
      <button onclick="switchTab('history', this)">발주 이력</button>
      <button onclick="switchTab('recommend', this)">발주 필요</button>
    `;
  }
}

function renderMain(html) {
  document.getElementById('main-content').innerHTML = html;
}

function switchTab(id, btn) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (id === 'dashboard') renderAdminDashboard();
  else if (id === 'order') renderOrder();
  else if (id === 'receive') renderReceive();
  else if (id === 'history') renderHistory();
  else if (id === 'items') renderItems();
  else if (id === 'recommend') renderRecommend();
  else if (id === 'users') renderUsers();
  else if (id === 'upload') renderUpload();
}

function renderUserHome() { renderOrder(); }

// ── 대시보드 (관리자) ──
async function renderAdminDashboard() {
  renderMain(`<div class="page-title">대시보드</div>
    <div class="cards">
      <div class="metric"><div class="metric-label">전체 품목</div><div class="metric-value" id="m-total">-</div></div>
      <div class="metric"><div class="metric-label">재고 부족</div><div class="metric-value danger" id="m-low">-</div></div>
      <div class="metric"><div class="metric-label">이번달 발주</div><div class="metric-value" id="m-month">-</div></div>
      <div class="metric"><div class="metric-label">미입고 건수</div><div class="metric-value warn" id="m-pending">-</div></div>
    </div>
    <div class="card"><div class="card-title">재고 현황</div>
      <table><thead><tr><th>품목명</th><th>업체</th><th>현재 재고</th><th>최소 기준</th><th>상태</th></tr></thead>
      <tbody id="stock-table"><tr><td colspan="5" class="empty">로딩 중...</td></tr></tbody></table>
    </div>`);
  const [items, orders] = await Promise.all([api('items?select=*'), api('orders?select=*')]);
  const low = items.filter(i => i.stock <= i.min_stock).length;
  const now = new Date();
  const monthOrders = orders.filter(o => { const d = new Date(o.order_date); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); }).length;
  const pending = orders.filter(o => o.status === '발주중').length;
  document.getElementById('m-total').textContent = items.length;
  document.getElementById('m-low').textContent = low;
  document.getElementById('m-month').textContent = monthOrders;
  document.getElementById('m-pending').textContent = pending;
  document.getElementById('stock-table').innerHTML = items.length === 0
    ? '<tr><td colspan="5" class="empty">품목을 먼저 등록해주세요</td></tr>'
    : items.map(i => { const ok = i.stock > i.min_stock; return `<tr><td>${i.name}</td><td>${i.vendor}</td><td>${i.stock}${i.unit}</td><td>${i.min_stock}${i.unit}</td><td><span class="badge ${ok?'badge-ok':'badge-danger'}">${ok?'정상':'부족'}</span></td></tr>`; }).join('');
}

// ── 발주 등록 ──
async function renderOrder() {
  const items = await api('items?select=*');
  const opts = items.map(i => `<option value="${i.id}" data-vendor="${i.vendor}" data-unit="${i.unit}" data-category="${i.category||'소모품'}" data-subcategory="${i.sub_category||'기타'}">${i.name}</option>`).join('');
  renderMain(`<div class="page-title">발주 요청 등록</div>
    <div class="card">
      <div class="form-row">
        <div class="form-group"><label>품목 선택</label><select id="o-item" onchange="fillOrderVendor()"><option value="">선택하세요</option>${opts}</select></div>
        <div class="form-group"><label>발주 업체</label><input id="o-vendor" readonly placeholder="품목 선택 시 자동입력"></div>
      </div>
      <div class="form-row three">
        <div class="form-group"><label>대분류</label><select id="o-category">
          <option value="소모품">소모품</option><option value="비품">비품</option>
        </select></div>
        <div class="form-group"><label>소분류</label><select id="o-subcategory">
          <option value="기타">기타</option><option value="기계장비">기계장비</option>
          <option value="수선비">수선비</option><option value="잉크/리본">잉크/리본</option>
          <option value="와이퍼">와이퍼</option><option value="필터">필터</option>
        </select></div>
        <div class="form-group"><label>부서명</label><input id="o-department" placeholder="예: 고형제제조1팀"></div>
      </div>
      <div class="form-row three">
        <div class="form-group"><label>발주 수량</label><input id="o-qty" type="number" min="1" placeholder="수량"></div>
        <div class="form-group"><label>단위</label><input id="o-unit" readonly placeholder="자동입력"></div>
        <div class="form-group"><label>금액 (만원)</label><input id="o-amount" type="number" step="0.1" placeholder="0.0"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>발주 예정일</label><input id="o-date" type="date" value="${today()}"></div>
        <div class="form-group"><label>비고 (적요)</label><input id="o-note" placeholder="상세 내용 입력"></div>
      </div>
      <div class="btn-row"><button class="btn btn-primary" onclick="addOrder()">발주 등록</button></div>
    </div>`);
  window._orderItems = items;
}

function fillOrderVendor() {
  const sel = document.getElementById('o-item');
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('o-vendor').value = opt.dataset.vendor || '';
  document.getElementById('o-unit').value = opt.dataset.unit || '';
  if (opt.dataset.category) document.getElementById('o-category').value = opt.dataset.category;
  if (opt.dataset.subcategory) document.getElementById('o-subcategory').value = opt.dataset.subcategory;
}

async function addOrder() {
  const item_id = parseInt(document.getElementById('o-item').value);
  const qty = parseInt(document.getElementById('o-qty').value);
  const order_date = document.getElementById('o-date').value;
  const note = document.getElementById('o-note').value;
  const category = document.getElementById('o-category').value;
  const sub_category = document.getElementById('o-subcategory').value;
  const department = document.getElementById('o-department').value;
  const amount = parseFloat(document.getElementById('o-amount').value) || 0;
  if (!item_id || !qty || qty < 1) { showToast('품목과 수량을 입력해주세요'); return; }
  const item = (window._orderItems || []).find(i => i.id === item_id);
  await api('orders', 'POST', { item_id, item_name: item.name, vendor: item.vendor, unit: item.unit, qty, order_date, note, status: '발주중', created_by: currentUserName, category, sub_category, department, amount });
  showToast('발주가 등록되었어요!');
  document.getElementById('o-qty').value = '';
  document.getElementById('o-note').value = '';
  document.getElementById('o-amount').value = '';
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
    return obj;
  });
}

function parseCSVLine(line) {
  const result = [];
  let cur = '';
  let inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (ch === ',' && !inQuote) {
      result.push(cur); cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

function previewCSV(e, previewId) {
  const file = e.target.files[0];
  if (!file) return;
  const tryRead = (encoding) => new Promise(res => {
    const r = new FileReader();
    r.onload = ev => res(ev.target.result);
    r.readAsText(file, encoding);
  });
  (async () => {
    let text = await tryRead('UTF-8');
    if (text.includes('â€') || text.includes('ï¿½') || /[\uFFFD]/.test(text)) {
      text = await tryRead('EUC-KR');
    }
    if (previewId === 'items-preview') window._itemsCSV = text;
    if (previewId === 'orders-preview') window._ordersCSV = text;
    const rows = parseCSV(text);
    const preview = document.getElementById(previewId);
    if (rows.length === 0) { preview.innerHTML = '<p style="color:var(--danger);font-size:13px">데이터가 없어요</p>'; return; }
    const keys = Object.keys(rows[0]);
    preview.innerHTML = `<p style="font-size:12px;color:var(--text-muted);margin-bottom:6px">${rows.length}개 행 미리보기:</p>
      <div style="overflow-x:auto"><table style="font-size:12px">
        <thead><tr>${keys.map(k=>`<th style="padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text-muted)">${k}</th>`).join('')}</tr></thead>
        <tbody>${rows.slice(0,3).map(r=>`<tr>${keys.map(k=>`<td style="padding:5px 10px;border-bottom:1px solid var(--border)">${r[k]||'-'}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div>`;
  })();
}

async function uploadItems() {
  const text = window._itemsCSV;
  if (!text) { showToast('파일을 먼저 선택해주세요'); return; }
  const rows = parseCSV(text);
  if (rows.length === 0) { showToast('데이터가 없어요'); return; }
  let success = 0, fail = 0;
  for (const row of rows) {
    const name = row['품목명*'] || row['품목명'];
    const vendor = row['업체명*'] || row['업체명'];
    const unit = row['단위*'] || row['단위'] || '개';
    const stock = parseInt(row['현재재고']) || 0;
    const min_stock = parseInt(row['최소재고(발주기준)'] || row['최소재고']) || 0;
    if (!name || !vendor) { fail++; continue; }
    try {
      await api('items', 'POST', { name, vendor, unit, stock, min_stock });
      success++;
    } catch { fail++; }
  }
  showToast(`✅ ${success}개 등록 완료${fail>0?' / ❌ '+fail+'개 실패':''}`);
}

async function readFileWithEncoding(file) {
  const tryRead = (enc) => new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsText(file, enc);
  });
  let text = await tryRead('UTF-8');
  if (text.includes('â€') || text.includes('ï¿½') || /[\uFFFD]/.test(text)) {
    text = await tryRead('EUC-KR');
  }
  return text;
}

  const items = await api('items?select=*');
  let success = 0, fail = 0;
  for (const row of rows) {
    // 기존 Power BI 양식 지원: 입고일, 대분류, 소분류, 적요, 수량, 금액합, 거래처, 부서명
    const item_name = row['적요'] || row['품목명*'] || row['품목명'] || '';
    const vendor = row['거래처'] || row['업체명*'] || row['업체명'] || '';
    const category = row['대분류'] || row['category'] || '소모품';
    const sub_category = row['소분류'] || row['sub_category'] || '기타';
    const qty = parseInt(row['수량'] || row['발주수량*'] || row['발주수량']) || 0;
    const amount = parseFloat(row['금액합'] || row['금액'] || row['amount']) || 0;
    const department = row['부서명'] || row['department'] || '';
    const order_date = row['입고일'] || row['발주일자'] || today();
    const status = row['상태'] || '입고완료';
    const note = row['비고'] || '';
    const unit = row['단위'] || '개';
    if (!item_name || !vendor) { fail++; continue; }
    const matched = items.find(i => i.name === item_name);
    try {
      await api('orders', 'POST', {
        item_id: matched?.id || null,
        item_name, vendor, unit, qty, order_date,
        note, status, created_by: '일괄업로드',
        category, sub_category, department, amount
      });
      success++;
    } catch { fail++; }
  }
  showToast(`✅ ${success}개 등록 완료${fail>0?' / ❌ '+fail+'개 실패':''}`);
}

async function toggleRole(id, currentRoleVal) {
  const newRole = currentRoleVal === 'admin' ? 'user' : 'admin';
  const label = newRole === 'admin' ? '관리자' : '일반 사용자';
  if (!confirm(`${label}로 변경할까요?`)) return;
  await api(`profiles?id=eq.${id}`, 'PATCH', { role: newRole });
  showToast('권한이 변경되었어요!');
  loadUsersTable();
}
</script>
